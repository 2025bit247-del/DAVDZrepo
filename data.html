<!DOCTYPE html>
<html>
<head>
    <title>Data - Mbarara Connect</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #34495e;
            text-align: center;
            padding: 10px;
        }

        nav a {

            margin: 0 10px;

        main {

            padding: 25px;

            box-shadow: 0 0 10px lightgray;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        caption {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f2f2f2;
        }

        tfoot td {
            font-weight: bold;
            background-color: #ecf0f1;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;

</head>
